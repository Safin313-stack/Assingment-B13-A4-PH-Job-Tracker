<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Application Tracker</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./css/style.css" />
</head>
<body>

  <nav class="navbar">
    <a class="navbar-brand" href="#">
      <div class="brand-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="7" width="20" height="14" rx="2"/>
          <path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/>
          <line x1="12" y1="12" x2="12" y2="16"/>
          <line x1="10" y1="14" x2="14" y2="14"/>
        </svg>
      </div>
      <span class="brand-name">Job<span>Trackr</span></span>
    </a>
    <div class="navbar-right">
      <div class="nav-avatar" title="Profile">U</div>
    </div>
  </nav>

  <div class="page">

    <h1 class="page-title">Job Application Tracker</h1>

    <div class="dashboard">
      <div class="stat-cell total">
        <div class="stat-label">Total</div>
        <div class="stat-value" id="count-total">8</div>
      </div>
      <div class="stat-cell interview">
        <div class="stat-label">Interview</div>
        <div class="stat-value green" id="count-interview">0</div>
      </div>
      <div class="stat-cell rejected">
        <div class="stat-label">Rejected</div>
        <div class="stat-value red" id="count-rejected">0</div>
      </div>
    </div>

    <div class="section-header">
      <span class="section-title">Available Jobs</span>
      <span class="section-count" id="tab-count">8 jobs</span>
    </div>

    <div class="tabs" role="tablist">
      <button class="tab-btn active" data-tab="all"       role="tab" aria-selected="true">All</button>
      <button class="tab-btn"        data-tab="interview" role="tab" aria-selected="false">Interview</button>
      <button class="tab-btn"        data-tab="rejected"  role="tab" aria-selected="false">Rejected</button>
    </div>

    <div id="cards-container" role="list"></div>

    <div class="empty-state" id="empty-state" role="status">
      <div class="empty-icon">

        <img src="./css/jobs.png" alt="No jobs" />
      </div>
      <div class="empty-title" id="empty-title">No jobs available</div>
      <div class="empty-sub"   id="empty-sub">Check back soon for new job opportunities</div>
    </div>

  </div>

  <div class="toast" id="toast">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
    <span id="toast-msg"></span>
  </div>

    <script src="app.js"></script>
</body>
</html>
