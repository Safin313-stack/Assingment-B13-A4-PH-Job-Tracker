<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Application Tracker</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="./css/style.css" />
</head>

<body>


  <div class="page">

    <div class="header-row">
      <h1 class="page-title">Job Application Tracker</h1>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>

    <div class="dashboard">
      <div class="stat-cell total">
        <div class="stat-label">Total</div>
        <div class="stat-value" id="count-total">8</div>
      </div>
      <div class="stat-cell interview">
        <div class="stat-label">Interview</div>
        <div class="stat-value green" id="count-interview">0</div>
      </div>
      <div class="stat-cell rejected">
        <div class="stat-label">Rejected</div>
        <div class="stat-value red" id="count-rejected">0</div>
      </div>
    </div>

    <div class="section-header">
      <span class="section-title">Available Jobs</span>
      <span class="section-count" id="tab-count">8 jobs</span>
    </div>

    <div class="tabs" role="tablist">
      <button type="button" class="tab-btn active" data-tab="all" role="tab" aria-selected="true">All</button>
      <button type="button" class="tab-btn" data-tab="interview" role="tab" aria-selected="false">Interview</button>
      <button type="button" class="tab-btn" data-tab="rejected" role="tab" aria-selected="false">Rejected</button>
    </div>

    <div id="cards-container" role="list"></div>

    <div class="empty-state" id="empty-state" role="status">
      <div class="empty-icon">

        <img src="./css/jobs.png" alt="No jobs" />
      </div>
      <div class="empty-title" id="empty-title">No jobs available</div>
      <div class="empty-sub" id="empty-sub">Check back soon for new job opportunities</div>
    </div>

  </div>

  <div class="toast" id="toast">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
      stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12" />
    </svg>
    <span id="toast-msg"></span>
  </div>

  <script src="app.js"></script>
</body>

</html>
